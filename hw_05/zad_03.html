<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title></title>
</head>
<body>
    <script>
        const N = +prompt('N = ')
        let less = ''
        for(let i = 0; i <= 100; i++){
            if(i**2 <= N){
                less += `${i} `
            }
            else break
        }
        alert(less)
    </script>
</body>
</html>
