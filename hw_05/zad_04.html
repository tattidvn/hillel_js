<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title></title>
</head>
<body>
    <script>
        const num = +prompt('number = ')
        const sqrNum = Math.sqrt(num)
        let res = true
        for(let i = 2; i <= sqrNum; i++){
            if(num % i === 0){
                res = false
                break
            }
        }
        alert(res)
    </script>
</body>
</html>
