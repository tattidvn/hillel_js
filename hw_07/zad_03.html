<script>
  const array = [1, 3, 4, 6, 2, 5, 7]
  function func(massyv, elem){
    let newArray = []
    for(let i in massyv){
      massyv[i] !== elem ? newArray.push(massyv[i]) : newArray
    }
    return newArray
  }
  console.log(func(array, 5))
