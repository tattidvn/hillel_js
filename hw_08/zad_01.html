<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title></title>
</head>
<body>
<script>
    function findSum(){
        let start = 0
        return function (num){
            start = start + num
            return start
        }
    }

    let sum = findSum()
    console.log(sum(4))
    console.log(sum(6))
    // let start = 50
    // start = start + 2// не относиться к старт в 12 строке
    // console.log(start) // 50 + 2 выведет глобал
    console.log(sum(10)) // добавит к 4 + 6 + 10
    console.log(sum(16))

</script>
</body>
</html>
