<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title></title>
</head>
<body>
<script>
    let ladder = {
        level: 0,
        up(){
            return this.level++
        },
        down(){
            return this.level--
        },
        showStep(){
            return console.log(this.level)
        }
    }
    ladder.up().down().up().down().up().up().showStep()
</script>
</body>
</html>
